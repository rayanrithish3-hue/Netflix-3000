<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bharathi Priya - Netflix Gift</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#141414;
color:white;
overflow-x:hidden;
}

/* NETFLIX INTRO */

#intro{
position:fixed;
inset:0;
background:black;
z-index:9999;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
animation:hideIntro 6s forwards;
}

#intro video{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes hideIntro{
0%,85%{
opacity:1;
visibility:visible;
}

100%{
opacity:0;
visibility:hidden;
}
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
padding:20px 60px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
background:linear-gradient(to bottom,rgba(0,0,0,0.9),transparent);
}

.logo{
color:#E50914;
font-size:42px;
font-weight:900;
letter-spacing:2px;
}

.profile{
width:38px;
height:38px;
background:#E50914;
border-radius:4px;
}

/* HERO */

.hero{
height:100vh;
background:
linear-gradient(to top,rgba(20,20,20,1),rgba(20,20,20,0.2)),
linear-gradient(to right,rgba(0,0,0,0.9),rgba(0,0,0,0.1)),
url('main-thumbnail.jpg');

background-size:cover;
background-position:center;
display:flex;
align-items:flex-end;
padding:60px;
}

.hero-content{
max-width:700px;
margin-bottom:100px;
animation:fadeIn 1.5s ease;
}

.netflix-original{
color:#E50914;
font-size:18px;
font-weight:bold;
letter-spacing:4px;
margin-bottom:20px;
}

.hero-content h1{
font-size:95px;
font-weight:900;
line-height:0.95;
margin-bottom:25px;
}

.hero-content p{
font-size:20px;
line-height:1.7;
color:#ddd;
margin-bottom:35px;
}

.buttons{
display:flex;
gap:15px;
}

.btn{
padding:15px 35px;
border:none;
border-radius:5px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.play-btn{
background:white;
color:black;
}

.play-btn:hover{
background:#d6d6d6;
transform:scale(1.05);
}

.info-btn{
background:rgba(109,109,110,0.7);
color:white;
}

.info-btn:hover{
background:rgba(109,109,110,0.5);
}

/* MOVIES */

.section{
padding:40px 60px;
margin-top:-120px;
position:relative;
z-index:10;
}

.section h2{
font-size:32px;
margin-bottom:25px;
}

.movie-row{
display:flex;
gap:25px;
overflow-x:auto;
padding-bottom:20px;
}

.movie-row::-webkit-scrollbar{
display:none;
}

.movie-card{
min-width:300px;
border-radius:18px;
overflow:hidden;
position:relative;
cursor:pointer;
transition:0.4s;
background:#222;
}

.movie-card:hover{
transform:scale(1.08);
z-index:20;
}

.movie-card img{
width:100%;
height:450px;
object-fit:cover;
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,rgba(0,0,0,0.95),transparent);
}

.movie-info{
position:absolute;
bottom:0;
padding:20px;
}

.movie-info h3{
font-size:40px;
font-weight:900;
margin-bottom:8px;
}

/* PLAYER */

.player-section{
display:none;
padding:40px 60px;
animation:fadeIn 0.8s ease;
}

.player-section.active{
display:block;
}

.back-btn{
background:#E50914;
border:none;
color:white;
padding:12px 28px;
font-size:16px;
border-radius:5px;
cursor:pointer;
margin-bottom:30px;
}

.video-container{
max-width:1100px;
margin:auto;
}

.video-title{
font-size:55px;
font-weight:900;
margin-bottom:20px;
}

.video-description{
color:#bbb;
line-height:1.7;
margin-bottom:30px;
font-size:18px;
}

.video-container video{
width:100%;
border-radius:20px;
background:black;
}

/* ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */

@media(max-width:768px){

.navbar{
padding:20px;
}

.hero{
padding:25px;
}

.hero-content h1{
font-size:58px;
}

.hero-content p{
font-size:16px;
}

.section,
.player-section{
padding:30px 20px;
}

.movie-card{
min-width:240px;
}

.movie-card img{
height:360px;
}

.video-title{
font-size:40px;
}

}

</style>
</head>

<body>

<!-- NETFLIX INTRO -->

<div id="intro">

<video autoplay controls playsinline>
<source src="netflix-intro.mp4" type="video/mp4">
</video>

</div>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">NETFLIX</div>

<div class="profile"></div>

</div>

<!-- HERO -->

<section class="hero">

<div class="hero-content">

<div class="netflix-original">
NETFLIX ORIGINAL
</div>

<h1>Bharathi<br>Priya</h1>

<p>
The collection of memories, funny moments,
crazy moments, laughters etc...
</p>

<div class="buttons">

<button class="btn play-btn">
▶ Play
</button>

<button class="btn info-btn">
ℹ More Info
</button>

</div>

</div>

</section>

<!-- MOVIES -->

<section class="section">

<h2>Trending Now</h2>

<div class="movie-row">

<!-- MOVIE 1 -->

<div class="movie-card" onclick="playVideo('video1.mp4','BP')">

<img src="poster1.jpg">

<div class="overlay"></div>

<div class="movie-info">
<h3>BP</h3>
</div>

</div>

<!-- MOVIE 2 -->

<div class="movie-card" onclick="playVideo('video2.mp4','Rider 3000')">

<img src="poster2.jpg">

<div class="overlay"></div>

<div class="movie-info">
<h3>Rider 3000</h3>
</div>

</div>

<!-- MOVIE 3 -->

<div class="movie-card" onclick="playVideo('video3.mp4','Memories')">

<img src="poster3.jpg">

<div class="overlay"></div>

<div class="movie-info">
<h3>Memories</h3>
</div>

</div>

</div>

</section>

<!-- PLAYER -->

<section class="player-section" id="playerSection">

<button class="back-btn" onclick="closePlayer()">
← Back
</button>

<div class="video-container">

<h1 class="video-title" id="videoTitle"></h1>

<p class="video-description">
Private memory collection.
</p>

<video controls autoplay id="mainVideo">
<source id="videoSource" src="">
</video>

</div>

</section>

<script>

function playVideo(video,title){

document.getElementById("playerSection").classList.add("active");

document.getElementById("videoSource").src = video;

document.getElementById("mainVideo").load();

document.getElementById("videoTitle").innerText = title;

window.scrollTo({
top:document.getElementById("playerSection").offsetTop,
behavior:"smooth"
});

}

function closePlayer(){

document.getElementById("playerSection").classList.remove("active");

window.scrollTo({
top:0,
behavior:"smooth"
});

}

</script>

</body>
</html>
